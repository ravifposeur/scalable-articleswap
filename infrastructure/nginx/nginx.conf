# File: infrastructure/nginx/nginx.conf

events {
    # Jumlah maksimal koneksi simultan yang bisa ditangani satu worker Nginx
    worker_connections 2048;
}

http {
    # Menyembunyikan versi Nginx agar lebih aman dari probing
    server_tokens off;

    # ==========================================
    # UPSTREAM (Target Redundansi)
    # ==========================================
    upstream backend_article_service {
        # Menggunakan 'least_conn' alih-alih round-robin biasa.
        # Nginx akan pintar melempar trafik ke container Go yang paling nganggur.
        least_conn;

        # max_fails dan fail_timeout adalah fitur Circuit Breaker bawaan Nginx.
        # Jika container Go mati/gagal 3 kali dalam 10 detik, Nginx akan memblokirnya
        # sementara dan memindah beban 100% ke container sebelahnya.
        server api_gateway_1:8080 max_fails=3 fail_timeout=10s;
        server api_gateway_2:8080 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name localhost;

        # ==========================================
        # PENGATURAN CORS (Cross-Origin Resource Sharing)
        # ==========================================
        # Ini memastikan temanmu tidak kena error merah di browser saat ngetest API
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept' always;

        # ==========================================
        # RUTE SPESIFIK (Eksplisit untuk Temanmu)
        # ==========================================

        # 1. Rute Submit Artikel
        location /api/submit {
            # Tangani preflight CORS otomatis
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            proxy_pass http://backend_article_service/api/submit;

            # Meneruskan IP asli pengguna ke backend Go
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Fail-Fast Timeout: Jika Go nyangkut lebih dari 5 detik, Nginx
            # akan putus koneksi dan kasih error, agar RAM tidak meledak.
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        # 2. Rute Forwarding (Cek Hasil)
        location /api/forward {
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            proxy_pass http://backend_article_service/api/forward;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Rute Health Check (Untuk testing infrastrukturmu sendiri)
        location /health {
            default_type application/json;
            return 200 '{"status": "Gateway is healthy", "redundancy": "Active"}';
        }

        # 4. Fallback (Jika orang nembak URL sembarangan)
        location / {
            default_type application/json;
            return 404 '{"error": "Endpoint tidak valid. Gunakan /api/submit atau /api/forward"}';
        }
    }
}
